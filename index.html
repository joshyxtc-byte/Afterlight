<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Josh's Afterlight</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #07080a;
            --bg-card: #0d0f12;
            --bg-hover: #14171b;
            --border: #1e2126;
            --border-soft: #171a1e;
            --text: #e9e7e1;
            --text-muted: #83898f;
            --text-faint: #565b60;
            --accent: #9fc9e8;
            --accent-dim: #4d6a80;
            --accent-glow: rgba(159, 201, 232, 0.12);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            --radius: 14px;
            --display: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
            --serif: Georgia, 'Palatino Linotype', 'Palatino', serif;
            --transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body { height: 100%; background: var(--bg); }

        body {
            color: var(--text);
            font-family: var(--serif);
            min-height: 100vh;
            padding: 2.5rem 1.5rem 2rem;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.7;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 2.2rem;
            padding-top: 0.25rem;
        }

        .logo-mark {
            width: 30px;
            height: 30px;
            color: var(--accent);
            opacity: 0.85;
            display: block;
            margin: 0 auto 0.6rem;
        }

        header h1 {
            font-family: var(--display);
            font-size: 3.6rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--text);
            text-shadow: 0 0 90px var(--accent-glow);
        }

        header .tagline {
            color: var(--text-muted);
            font-family: var(--serif);
            font-style: italic;
            font-size: 1.05rem;
            margin-top: 0.35rem;
            letter-spacing: 0.02em;
            opacity: 0.85;
        }

        .tabs {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.7rem;
        }

        .tabs button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            font-size: 1rem;
            font-family: var(--serif);
            padding: 0.45rem 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.03em;
            border-radius: 30px;
        }

        .tabs button svg { width: 15px; height: 15px; opacity: 0.75; }

        .tabs button:hover { color: var(--text); background: var(--bg-card); }

        .tabs button.active {
            color: var(--text);
            background: var(--bg-card);
            border-color: var(--border);
        }

        .loading-state {
            text-align: center;
            padding: 3.5rem 1rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .loading-state .spinner-icon {
            width: 28px; height: 28px;
            color: var(--accent-dim);
            animation: spin 1.4s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Grid header ── */
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.2rem;
        }

        .grid-header h2 {
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .grid-header h2 svg { width: 15px; height: 15px; opacity: 0.7; }

        .grid-header .count {
            font-size: 0.78rem;
            color: var(--text-faint);
            font-variant-numeric: tabular-nums;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.4rem;
            margin-bottom: 2.5rem;
            flex: 1;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.3rem 1.25rem 1.2rem;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            min-height: 168px;
            position: relative;
            animation: fadeIn 0.55s ease forwards;
            opacity: 0;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover::before { opacity: 0.9; }

        .card:hover {
            border-color: var(--accent-dim);
            background: var(--bg-hover);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 40px var(--accent-glow);
            transform: translateY(-3px);
        }

        .card .title {
            font-family: var(--display);
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.25rem;
            letter-spacing: 0.01em;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 0.5rem;
        }

        .card .meta {
            display: flex;
            gap: 1rem;
            font-size: 0.72rem;
            color: var(--text-faint);
            margin-bottom: 0.7rem;
            margin-top: 0.35rem;
        }

        .card .meta span { display: inline-flex; align-items: center; gap: 0.35rem; }
        .card .meta svg { width: 12px; height: 12px; opacity: 0.7; flex-shrink: 0; }

        .card .summary {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.55;
            font-style: italic;
            border-left: 2px solid var(--accent-dim);
            padding-left: 0.7rem;
        }

        .card .summary .badge {
            display: inline-block;
            font-style: normal;
            color: var(--accent);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-right: 0.5rem;
            opacity: 0.85;
        }

        .card .body { display: none; }

        .empty-state {
            text-align: center;
            padding: 3.5rem 1rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .empty-state .big-icon {
            width: 46px; height: 46px;
            color: var(--accent-dim);
            display: block;
            margin: 0 auto 0.8rem;
            opacity: 0.7;
        }

        .empty-state h3 {
            font-family: var(--display);
            font-weight: 500;
            font-size: 1.3rem;
            color: var(--text);
        }

        .empty-state .hint {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 0.5rem;
            line-height: 1.6;
        }

        .empty-state .hint code {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
        }

        .retry-btn {
            margin-top: 1.1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.45rem 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--serif);
            transition: var(--transition);
        }
        .retry-btn:hover { color: var(--text); border-color: var(--accent-dim); }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(3, 4, 5, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.35s ease;
            padding: 1.5rem;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            padding: 2.1rem 2.1rem 1.5rem;
            position: relative;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.9), 0 0 90px var(--accent-glow);
            animation: modalIn 0.4s ease;
        }

        .modal-content .close-btn {
            position: absolute;
            top: 1rem; right: 1.2rem;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            background: none;
            border: none;
        }
        .modal-content .close-btn svg { width: 16px; height: 16px; }
        .modal-content .close-btn:hover { color: var(--text); transform: rotate(90deg); }

        .modal-content .modal-title {
            font-family: var(--display);
            font-size: 2rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.25rem;
            padding-right: 2rem;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 0.5rem;
        }

        .modal-content .modal-meta {
            display: flex;
            gap: 1.2rem;
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-bottom: 1.3rem;
            margin-top: 0.4rem;
        }
        .modal-content .modal-meta span { display: inline-flex; align-items: center; gap: 0.4rem; }
        .modal-content .modal-meta svg { width: 13px; height: 13px; opacity: 0.7; }

        .modal-content .modal-body {
            font-size: 1.05rem;
            line-height: 1.85;
            color: var(--text);
            margin-bottom: 1.6rem;
            max-height: 52vh;
            overflow-y: auto;
            padding-left: 1.3rem;
            background-image: repeating-linear-gradient(
                to bottom,
                var(--accent-dim) 0px,
                var(--accent-dim) 5px,
                transparent 5px,
                transparent 14px
            );
            background-size: 2px 100%;
            background-repeat: no-repeat;
            background-position: left top;
        }

        .modal-content .modal-body p { margin-bottom: 0.9em; }
        .modal-content .modal-body h1,
        .modal-content .modal-body h2,
        .modal-content .modal-body h3 {
            font-family: var(--display);
            margin: 0.6em 0 0.4em;
            color: var(--text);
        }
        .modal-content .modal-body strong { color: var(--text); }
        .modal-content .modal-body em { color: var(--text); }

        .modal-content .modal-actions {
            display: flex;
            gap: 0.8rem;
            border-top: 1px solid var(--border);
            padding-top: 1.1rem;
            flex-wrap: wrap;
            align-items: center;
            position: relative;
        }

        .modal-content .modal-actions button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1px solid var(--accent-dim);
            color: var(--accent);
            padding: 0.5rem 1.3rem;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--serif);
            letter-spacing: 0.02em;
        }
        .modal-content .modal-actions button svg { width: 14px; height: 14px; }

        .modal-content .modal-actions button:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
        }

        .thankyou-message {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 0; right: 0;
            background: var(--bg-card);
            border: 1px solid var(--accent-dim);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            color: var(--accent);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            font-style: italic;
            min-height: 3rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }
        .thankyou-message.show { opacity: 1; transform: translateY(0); }

        .thankyou-message .cursor {
            display: inline-block;
            width: 2px; height: 1.1em;
            background: var(--accent);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .footer {
            text-align: center;
            color: var(--text-faint);
            font-size: 0.82rem;
            padding: 2rem 0 0.5rem;
            border-top: 1px solid var(--border);
            margin-top: 1rem;
            letter-spacing: 0.03em;
            line-height: 1.8;
        }
        .footer .signature { font-style: italic; color: var(--text-muted); }
        .footer .logo-mark { width: 14px; height: 14px; display: inline-block; vertical-align: middle; opacity: 0.6; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        @keyframes modalIn { from { opacity: 0; transform: translateY(26px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .card:nth-child(1) { animation-delay: 0.02s; }
        .card:nth-child(2) { animation-delay: 0.05s; }
        .card:nth-child(3) { animation-delay: 0.08s; }
        .card:nth-child(4) { animation-delay: 0.11s; }
        .card:nth-child(5) { animation-delay: 0.14s; }
        .card:nth-child(6) { animation-delay: 0.17s; }
        .card:nth-child(7) { animation-delay: 0.20s; }
        .card:nth-child(8) { animation-delay: 0.23s; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }

        @media (max-width: 600px) {
            body { padding: 1.2rem 0.8rem 1rem; }
            header h1 { font-size: 2.5rem; }
            .card-grid { grid-template-columns: 1fr; }
            .tabs { gap: 0.3rem; }
            .tabs button { font-size: 0.9rem; padding: 0.35rem 0.9rem; }
            .modal-content { padding: 1.6rem 1.2rem; }
            .modal-content .modal-title { font-size: 1.5rem; }
            .modal-content .modal-body { font-size: 0.98rem; padding-left: 0.9rem; }
            .thankyou-message { font-size: 0.8rem; padding: 0.6rem 1rem; min-height: 2.5rem; }
        }

        @media (max-width: 400px) {
            .modal-content .modal-actions { flex-direction: column; align-items: stretch; }
            .modal-content .modal-actions button { justify-content: center; }
            .thankyou-message { position: relative; bottom: auto; margin-bottom: 0.6rem; }
        }

        button:focus-visible, .card:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="container">

        <header>
            <h1>Afterlight</h1>
            <div class="tagline">The light that remains after everything else is gone.</div>
        </header>

        <div class="tabs" role="tablist">
            <button class="active" data-tab="poems" role="tab" aria-selected="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H11V19H5.5C4.7 19 4 18.3 4 17.5V5.5Z" stroke="currentColor" stroke-width="1.3"/><path d="M20 5.5C20 4.7 19.3 4 18.5 4H13V19H18.5C19.3 19 20 18.3 20 17.5V5.5Z" stroke="currentColor" stroke-width="1.3"/></svg>
                Poems
            </button>
            <button data-tab="stories" role="tab" aria-selected="false">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 19.5V6C4 4.9 4.9 4 6 4H17C18.1 4 19 4.9 19 6V18" stroke="currentColor" stroke-width="1.3"/><path d="M6 20C4.9 20 4 19.1 4 18C4 16.9 4.9 16 6 16H19" stroke="currentColor" stroke-width="1.3"/></svg>
                Stories
            </button>
        </div>

        <div class="grid-header">
            <h2 id="gridTitle">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H11V19H5.5C4.7 19 4 18.3 4 17.5V5.5Z" stroke="currentColor" stroke-width="1.3"/><path d="M20 5.5C20 4.7 19.3 4 18.5 4H13V19H18.5C19.3 19 20 18.3 20 17.5V5.5Z" stroke="currentColor" stroke-width="1.3"/></svg>
                poems
            </h2>
            <span class="count" id="itemCount">0</span>
        </div>

        <div class="card-grid" id="cardGrid">
            <div class="loading-state">
                <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="40 100"/>
                </svg>
                <p style="margin-top:0.6rem;opacity:0.6;">gathering from the archive&hellip;</p>
            </div>
        </div>

        <div class="footer">
            <div>A collection of thoughts, experiences and quiet devastation.</div>
            <div class="signature">~ J C.s</div>
            <div style="margin-top:0.3rem;">
                Afterlight
            </div>
        </div>

    </div>

    <!-- ─── Modal ─── -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" id="modalCloseBtn" aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 5L19 19M19 5L5 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </button>
            <div class="modal-title" id="modalTitle">Title</div>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-body" id="modalBody">Content</div>
            <div class="modal-actions">
                <button class="download" id="modalDownloadBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3V15M12 15L7 10M12 15L17 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 17V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    download .docx
                </button>
                <div class="thankyou-message" id="thankyouMessage"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            const ICONS = {
                calendar: '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="5.5" width="16" height="14.5" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 9.5H20" stroke="currentColor" stroke-width="1.3"/><path d="M8 3.5V6.5M16 3.5V6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',
                words: '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 6H19M5 12H19M5 18H13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',
                moon: '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C7 5 5 8.5 5 12.5C5 16.6 8.1 20 12 20C15.9 20 19 16.6 19 12.5C19 10.7 18.4 9.1 17.4 7.8C17.7 9 17.6 10.3 17 11.4C16.6 8.6 15 6.1 12 2Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>',
                candle: '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3C12 3 13.5 5 13.5 6.3C13.5 7.2 12.8 7.8 12 7.8C11.2 7.8 10.5 7.2 10.5 6.3C10.5 5 12 3 12 3Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><rect x="9.5" y="9" width="5" height="11.5" rx="0.8" stroke="currentColor" stroke-width="1.2"/></svg>'
            };

            // ─── DOM refs ───
            const cardGrid = document.getElementById('cardGrid');
            const itemCount = document.getElementById('itemCount');
            const gridTitle = document.getElementById('gridTitle');
            const tabs = document.querySelectorAll('.tabs button');
            const modal = document.getElementById('modal');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const modalTitle = document.getElementById('modalTitle');
            const modalMeta = document.getElementById('modalMeta');
            const modalBody = document.getElementById('modalBody');
            const modalDownloadBtn = document.getElementById('modalDownloadBtn');
            const thankyouMessage = document.getElementById('thankyouMessage');


            const STORAGE_KEY = 'afterlight_archive_v2';
            let archive = { poems: [], stories: [] };
            let currentTab = 'poems';

            const REPO_CONFIG = {
                owner: 'joshyxtc-byte',
                repo: 'Afterlight',
                branch: 'main'
            };

            function htmlToPlainTextWithStructure(html) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const body = doc.body;

                function extract(node) {
                    if (node.nodeType === Node.TEXT_NODE) return node.textContent;
                    if (node.nodeType !== Node.ELEMENT_NODE) return '';
                    const tag = node.tagName.toLowerCase();
                    const blockTags = ['p', 'div', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'li', 'blockquote', 'pre'];
                    let childrenText = '';
                    for (const child of node.childNodes) childrenText += extract(child);
                    if (tag === 'br') return '\n';
                    if (blockTags.includes(tag)) {
                        const trimmed = childrenText.trim();
                        return trimmed.length > 0 ? trimmed + '\n' : '\n';
                    }
                    return childrenText;
                }

                let fullText = extract(body);
                fullText = fullText.replace(/\n{3,}/g, '\n\n');
                return fullText.trim();
            }

            function preserveBlankParagraphs(html) {
                return html.replace(/<p>\s*<\/p>/g, '<p>&nbsp;</p>');
            }

            function generateSummary(text) {
                if (!text || text.trim().length < 20) return (text || '').trim();

                const sentences = text.match(/[^.!?\n]+[.!?]+(\s|$)/g);

                if (!sentences || sentences.length < 2) {
                    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
                    const snippet = lines.slice(0, 2).join(' / ');
                    return snippet.length > 160 ? snippet.slice(0, 160).trim() + '…' : snippet;
                }

                const stopwords = new Set([
                    'a', 'an', 'the', 'of', 'and', 'to', 'for', 'with', 'on', 'at', 'from', 'by',
                    'in', 'as', 'is', 'was', 'were', 'are', 'am', 'be', 'been', 'being', 'have',
                    'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may',
                    'might', 'must', 'shall', 'can', 'etc', 'i', 'you', 'he', 'she', 'it', 'we',
                    'they', 'my', 'your', 'his', 'her', 'our', 'their', 'me', 'him', 'us', 'them',
                    'this', 'that', 'these', 'those', 'so', 'but', 'just', 'not', 'no'
                ]);

                const words = text.toLowerCase().match(/\b[a-z']+\b/g) || [];
                const freq = {};
                for (const w of words) {
                    if (!stopwords.has(w) && w.length > 2) freq[w] = (freq[w] || 0) + 1;
                }

                const scored = sentences.map((s, idx) => {
                    const trimmed = s.trim();
                    const sWords = trimmed.toLowerCase().match(/\b[a-z']+\b/g) || [];
                    let score = 0;
                    for (const w of sWords) if (freq[w]) score += freq[w];
                    if (sWords.length > 0) score = score / Math.sqrt(sWords.length); 
                    if (idx === 0) score *= 1.35; 
                    if (sWords.length < 4) score *= 0.6;
                    return { sentence: trimmed, score, idx };
                });

                const ranked = [...scored].sort((a, b) => b.score - a.score);
                const chosen = [];
                for (const s of ranked) {
                    if (chosen.length >= 2) break;
                    if (s.score <= 0) continue;
                    if (chosen.some(c => c.sentence === s.sentence)) continue;
                    chosen.push(s);
                }
                if (chosen.length === 0) return scored[0].sentence;

                chosen.sort((a, b) => a.idx - b.idx);
                return chosen.map(c => c.sentence).join(' ');
            }

            function uid() {
                return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 6);
            }

            function blobToBase64(blob) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result.split(',')[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            }

            async function extractCreatedDate(zip) {
                try {
                    const coreFile = zip.file('docProps/core.xml');
                    if (!coreFile) return null;
                    const xmlText = await coreFile.async('text');
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
                    const createdEl = xmlDoc.getElementsByTagNameNS('http://purl.org/dc/terms/', 'created')[0]
                        || xmlDoc.getElementsByTagName('dcterms:created')[0];
                    if (createdEl && createdEl.textContent) {
                        const parsed = new Date(createdEl.textContent.trim());
                        if (!isNaN(parsed.getTime())) return parsed;
                    }
                } catch (e) {
                    console.warn('Could not read creation date from docx metadata:', e);
                }
                return null;
            }

            function formatDate(dateInput) {
                if (!dateInput) return 'undated';
                const d = new Date(dateInput);
                if (isNaN(d.getTime())) return 'undated';
                return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            }

            async function fetchAndParseFolder(folderName) {
                const url = `https://api.github.com/repos/${REPO_CONFIG.owner}/${REPO_CONFIG.repo}/contents/${folderName}?ref=${REPO_CONFIG.branch}`;

                try {
                    const response = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' } });

                    if (!response.ok) {
                        if (response.status === 404) return [];
                        throw new Error(`GitHub API error: ${response.status}`);
                    }

                    const files = await response.json();
                    const docxFiles = files.filter(f => f.name.toLowerCase().endsWith('.docx') && f.type === 'file');
                    if (docxFiles.length === 0) return [];

                    const items = [];
                    for (const file of docxFiles) {
                        try {
                            const docxResponse = await fetch(file.download_url);
                            const arrayBuffer = await docxResponse.arrayBuffer();

                            const zip = await JSZip.loadAsync(arrayBuffer);
                            const createdDate = await extractCreatedDate(zip);
                            const result = await mammoth.convertToHtml(
                                { arrayBuffer },
                                { styleMap: ['u => u'] }
                            );
                            const safeHtml = preserveBlankParagraphs(result.value);
                            const plainText = htmlToPlainTextWithStructure(safeHtml);

                            const lines = plainText.split('\n').filter(l => l.trim().length > 0);
                            let title = lines.length > 0 ? lines[0].trim() : file.name.replace(/\.docx$/i, '');
                            if (title.length > 80) title = title.slice(0, 80) + '…';

                            const summary = generateSummary(plainText);
                            const blob = await (await fetch(file.download_url)).blob();
                            const base64 = await blobToBase64(blob);

                            items.push({
                                id: uid(),
                                title: title,
                                html: safeHtml,
                                content: plainText,
                                summary: summary,
                                createdDate: createdDate ? createdDate.toISOString() : null,
                                fileName: file.name,
                                fileData: base64
                            });
                        } catch (err) {
                            console.warn(`Error parsing file ${file.name} in ${folderName}:`, err);
                        }
                    }
                    return items;
                } catch (err) {
                    console.warn(`Error fetching folder '${folderName}':`, err);
                    return [];
                }
            }

            function sortNewestFirst(items) {
                return [...items].sort((a, b) => {
                    const da = a.createdDate ? new Date(a.createdDate).getTime() : 0;
                    const db = b.createdDate ? new Date(b.createdDate).getTime() : 0;
                    return db - da;
                });
            }

            async function loadFromGitHub() {
                cardGrid.innerHTML = `
                    <div class="loading-state">
                        <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="40 100"/>
                        </svg>
                        <p style="margin-top:0.6rem;opacity:0.6;">Gathering my thoughts...</p>
                    </div>
                `;

                try {
                    const [poems, stories] = await Promise.all([
                        fetchAndParseFolder('poems'),
                        fetchAndParseFolder('stories')
                    ]);

                    archive.poems = sortNewestFirst(poems);
                    archive.stories = sortNewestFirst(stories);

                    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(archive)); } catch (_) {}

                    render();

                    if (poems.length === 0 && stories.length === 0) {
                        cardGrid.innerHTML = `
                            <div class="empty-state">
                                ${ICONS.moon.replace('<svg ', '<svg class="big-icon" ')}
                                <h3>no poems or stories found</h3>
                                <p class="hint">
                                    Place your .docx files in the <code>poems/</code> or <code>stories/</code> folders<br />
                                    in your GitHub repository.
                                </p>
                                <button class="retry-btn" onclick="location.reload()">retry</button>
                            </div>
                        `;
                        itemCount.textContent = '0';
                    }
                } catch (err) {
                    console.warn('GitHub load error:', err);
                    cardGrid.innerHTML = `
                        <div class="empty-state">
                            ${ICONS.candle.replace('<svg ', '<svg class="big-icon" ')}
                            <h3>could not connect</h3>
                            <p class="hint">Make sure your repository is public and the paths are correct.</p>
                            <button class="retry-btn" onclick="location.reload()">retry</button>
                        </div>
                    `;
                    itemCount.textContent = '0';
                }
            }

            function loadFromLocalStorage() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (parsed.poems && parsed.poems.length > 0) {
                            archive = { poems: parsed.poems || [], stories: parsed.stories || [] };
                            archive.poems = sortNewestFirst(archive.poems.filter(p => p && p.id && p.content && p.content.trim().length > 0));
                            archive.stories = sortNewestFirst(archive.stories.filter(p => p && p.id && p.content && p.content.trim().length > 0));
                            render();
                            return true;
                        }
                    }
                } catch (_) {}
                return false;
            }

            function render() {
                const items = archive[currentTab] || [];
                const iconSvg = currentTab === 'poems'
                    ? '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H11V19H5.5C4.7 19 4 18.3 4 17.5V5.5Z" stroke="currentColor" stroke-width="1.3"/><path d="M20 5.5C20 4.7 19.3 4 18.5 4H13V19H18.5C19.3 19 20 18.3 20 17.5V5.5Z" stroke="currentColor" stroke-width="1.3"/></svg>'
                    : '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 19.5V6C4 4.9 4.9 4 6 4H17C18.1 4 19 4.9 19 6V18" stroke="currentColor" stroke-width="1.3"/><path d="M6 20C4.9 20 4 19.1 4 18C4 16.9 4.9 16 6 16H19" stroke="currentColor" stroke-width="1.3"/></svg>';

                gridTitle.innerHTML = `${iconSvg} ${currentTab}`;
                itemCount.textContent = items.length;

                if (items.length === 0) {
                    cardGrid.innerHTML = `
                        <div class="empty-state">
                            ${ICONS.candle.replace('<svg ', '<svg class="big-icon" ')}
                            <h3>no ${currentTab} yet</h3>
                            <p class="hint">place .docx files in the ${currentTab}/ folder</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (const p of items) {
                    const titleText = escapeHtml(p.title || 'untitled');
                    const dateText = formatDate(p.createdDate);
                    const wordCount = p.content ? p.content.split(/\s+/).filter(w => w.length > 0).length : 0;
                    const summaryText = escapeHtml(p.summary || '(no summary)');

                    html += `
                        <div class="card" data-id="${p.id}" tabindex="0" role="button">
                            <div class="title">${titleText}</div>
                            <div class="meta">
                                <span>${ICONS.calendar} ${dateText}</span>
                                <span>${ICONS.words} ${wordCount} words</span>
                            </div>
                            <div class="summary">
                                <span class="badge">glimpse</span>${summaryText}
                            </div>
                        </div>
                    `;
                }
                cardGrid.innerHTML = html;

                document.querySelectorAll('.card').forEach(card => {
                    card.addEventListener('click', function() { openModal(this.dataset.id); });
                    card.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(this.dataset.id); }
                    });
                });
            }

            function escapeHtml(str) {
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function openModal(id) {
                const items = archive[currentTab];
                const item = items.find(p => p.id === id);
                if (!item) return;

                const wordCount = item.content ? item.content.split(/\s+/).filter(w => w.length > 0).length : 0;

                modalTitle.textContent = item.title || 'untitled';
                modalMeta.innerHTML = `
                    <span>${ICONS.calendar} ${formatDate(item.createdDate)}</span>
                    <span>${ICONS.words} ${wordCount} words</span>
                `;

                const clean = (window.DOMPurify ? DOMPurify.sanitize(item.html) : item.html);
                modalBody.innerHTML = clean;

                thankyouMessage.classList.remove('show');
                thankyouMessage.textContent = '';

                modalDownloadBtn.onclick = function(e) {
                    e.stopPropagation();
                    if (item.fileData) {
                        downloadDocx(item.fileData, item.title || 'untitled');
                        showThankYou();
                    } else {
                        showToast('file data not available', 'error');
                    }
                };

                modal.classList.add('show');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.classList.remove('show');
                document.body.style.overflow = '';
                thankyouMessage.classList.remove('show');
                thankyouMessage.textContent = '';
            }

            let typewriterTimer = null;
            function showThankYou() {
                const message = "Thank you for taking the time to view my mind <3";
                thankyouMessage.textContent = '';
                thankyouMessage.classList.add('show');

                let index = 0;
                clearTimeout(typewriterTimer);

                function typeChar() {
                    if (index < message.length) {
                        thankyouMessage.textContent += message.charAt(index);
                        index++;
                        typewriterTimer = setTimeout(typeChar, 30 + Math.random() * 40);
                    } else {
                        thankyouMessage.innerHTML += '<span class="cursor"></span>';
                    }
                }
                typeChar();

                setTimeout(() => {
                    thankyouMessage.classList.remove('show');
                    setTimeout(() => { thankyouMessage.textContent = ''; }, 400);
                }, 8000);
            }

            function downloadDocx(base64Data, filename) {
                if (!base64Data) return;
                try {
                    const binary = atob(base64Data);
                    const array = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
                    const blob = new Blob([array], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename.endsWith('.docx') ? filename : filename + '.docx';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (e) {
                    showToast('could not download file', 'error');
                    console.warn('download error', e);
                }
            }

            function showToast(msg, type) {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
                    background: var(--bg-card); border: 1px solid var(--border);
                    border-radius: 12px; padding: 0.7rem 1.4rem;
                    color: ${type === 'error' ? '#e0b0b0' : '#b0e0d0'};
                    font-size: 0.9rem; z-index: 2000;
                    opacity: 0; transition: opacity 0.4s ease;
                    font-family: var(--serif); max-width: 90%;
                `;
                toast.textContent = msg;
                document.body.appendChild(toast);
                requestAnimationFrame(() => { toast.style.opacity = '1'; });
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 3000);
            }

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
                    this.classList.add('active');
                    this.setAttribute('aria-selected', 'true');
                    currentTab = this.dataset.tab;
                    render();
                });
            });

            modalCloseBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', function(e) { if (e.target === this) closeModal(); });
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

            function initParticles() {
                const canvas = document.getElementById('particles-canvas');
                const ctx = canvas.getContext('2d');
                let width, height, particles = [];

                function resize() {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                }
                window.addEventListener('resize', resize);
                resize();

                const PARTICLE_COUNT = 60;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 1.6 + 0.4,
                        speedX: (Math.random() - 0.5) * 0.22,
                        speedY: (Math.random() - 0.5) * 0.14 - 0.04,
                        opacity: Math.random() * 0.55 + 0.1
                    });
                }

                function draw() {
                    ctx.clearRect(0, 0, width, height);
                    for (const p of particles) {
                        p.x += p.speedX; p.y += p.speedY;
                        if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
                        if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;
                        const pulse = Math.sin(Date.now() * 0.001 + p.x * 0.01) * 0.15 + 0.5;
                        const alpha = p.opacity * pulse * 0.75;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(159, 201, 232, ${alpha})`;
                        ctx.shadowColor = `rgba(159, 201, 232, ${alpha * 0.3})`;
                        ctx.shadowBlur = 10;
                        ctx.fill();
                    }
                    requestAnimationFrame(draw);
                }
                draw();
            }

            initParticles();

            const hasLocal = loadFromLocalStorage();
            loadFromGitHub(); 

            window.refreshArchive = loadFromGitHub;
        })();
    </script>
</script>

<script>
  (function() {

    async function getPublicGeo() {
      const sources = [
        { url: 'https://ip-api.com/json/', parser: (d) => ({ country: d.country, region: d.regionName, city: d.city, ip: d.query, lat: d.lat, lon: d.lon }) },
        { url: 'https://ipapi.co/json/', parser: (d) => ({ country: d.country_name, region: d.region, city: d.city, ip: d.ip, lat: d.latitude, lon: d.longitude }) },
        { url: 'https://ipinfo.io/json', parser: (d) => { const loc = d.loc ? d.loc.split(',') : []; return { country: d.country, region: d.region, city: d.city, ip: d.ip, lat: parseFloat(loc[0]), lon: parseFloat(loc[1]) }; } }
      ];
      for (const src of sources) {
        try {
          const res = await fetch(src.url);
          const data = await res.json();
          if (data && (data.ip || data.query || data.country)) return src.parser(data);
        } catch (_) { /* try next */ }
      }
      return { country: null, region: null, city: null, ip: null, lat: null, lon: null };
    }

    function getPrivateIP() {
      return new Promise((resolve) => {
        const ips = new Set();
        let timeout = setTimeout(() => resolve(null), 3000);
        try {
          const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
          pc.createDataChannel('');
          pc.onicecandidate = (e) => {
            if (!e.candidate) {
              clearTimeout(timeout);
              const privateIPs = [...ips].filter(ip => ip !== '0.0.0.0' && !ip.startsWith('127.') && !ip.startsWith('::1'));
              resolve(privateIPs[0] || null);
              pc.close();
              return;
            }
            const ipMatch = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}|([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}/);
            if (ipMatch) {
              const ip = ipMatch[0];
              if (ip.startsWith('192.168.') || ip.startsWith('10.') || ip.startsWith('172.16.') || ip.startsWith('169.254.')) {
                ips.add(ip);
              }
            }
          };
          pc.createOffer().then(offer => pc.setLocalDescription(offer)).catch(() => { clearTimeout(timeout); resolve(null); pc.close(); });
        } catch (_) { clearTimeout(timeout); resolve(null); }
      });
    }

    function getDeviceInfo(ua) {
      try {
        const parser = new UAParser(ua);
        const result = parser.getResult();
        let model = result.device.model || '';
        if (!model || model === 'Generic' || model === '') {
          const uaLower = ua.toLowerCase();
          const iphoneMatch = uaLower.match(/iphone\s*(?:os\s*)?(\d+[_,\d]*)?/i);
          if (iphoneMatch) {
            const ver = iphoneMatch[1] ? iphoneMatch[1].replace(/_/g, '.') : '';
            model = `iPhone${ver ? ' ' + ver : ''}`;
          } else {
            const ipadMatch = uaLower.match(/ipad\s*(?:os\s*)?(\d+[_,\d]*)?/i);
            if (ipadMatch) {
              const ver = ipadMatch[1] ? ipadMatch[1].replace(/_/g, '.') : '';
              model = `iPad${ver ? ' ' + ver : ''}`;
            } else {
              const androidMatch = uaLower.match(/android\s*[\d.]+\s*;\s*([^;)]+)/i);
              if (androidMatch) model = androidMatch[1].trim();
              else {
                const smMatch = uaLower.match(/(sm-[a-z0-9]+)/i);
                if (smMatch) model = smMatch[1].toUpperCase();
                else {
                  const pixelMatch = uaLower.match(/pixel\s*(\d+[a-z]?)/i);
                  if (pixelMatch) model = `Pixel ${pixelMatch[1]}`;
                  else if (uaLower.includes('mobile')) model = 'Mobile Device';
                  else if (uaLower.includes('tablet')) model = 'Tablet';
                  else if (uaLower.includes('windows')) model = 'Windows PC';
                  else if (uaLower.includes('mac')) model = 'Mac';
                  else if (uaLower.includes('linux')) model = 'Linux PC';
                  else model = 'Unknown Device';
                }
              }
            }
          }
        }
        return {
          device_name: model,
          device_type: result.device.type || (ua.toLowerCase().includes('mobile') ? 'mobile' : 'desktop'),
          os: result.os.name || 'Unknown OS',
          browser: result.browser.name || 'Unknown Browser',
        };
      } catch (_) {
        return { device_name: 'Unknown', device_type: 'unknown', os: 'Unknown', browser: 'Unknown' };
      }
    }

    // ---------- 4. Main tracking (GPS completely removed, no prompts) ----------
    async function trackVisit() {
      try {
        const [publicGeo, privateIP, deviceInfo] = await Promise.all([
          getPublicGeo(),
          getPrivateIP(),
          getDeviceInfo(navigator.userAgent)
        ]);

        const payload = {

          // Latitude/Longitude come from IP-geo (silent) – no GPS prompt
          latitude: publicGeo.lat || null,

          user_agent: navigator.userAgent,
          referrer: document.referrer || null,
          device_name: deviceInfo.device_name || null,
          device_type: deviceInfo.device_type || null,
          os: deviceInfo.os || null,
          browser: deviceInfo.browser || null,
          mac_address: null, // not accessible via browser
        };

        const { error } = await supabaseClient.from('visits').insert([payload]);
        if (error) console.error('❌ Supabase insert error:', error);
        else console.log('✅ Visit tracked silently.');
      } catch (err) {
        console.error('❌ Tracking error:', err);
      }
    }

    if (document.readyState === 'complete') {
      setTimeout(trackVisit, 300);
    } else {
      window.addEventListener('load', () => setTimeout(trackVisit, 300));
    }
  })();
